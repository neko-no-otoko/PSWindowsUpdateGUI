name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 40
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      CI: 'true'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.300
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Derive semantic version
        shell: powershell
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify, build, test, and package
        shell: powershell
        run: .\build\Build.ps1 -Configuration Release -Version $env:RELEASE_VERSION

      - name: Attest executable provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/release/PSWindowsUpdateGUI.exe

      - name: Publish GitHub Release
        shell: powershell
        run: |
          $assets = Get-ChildItem -LiteralPath artifacts/release -File | ForEach-Object FullName
          $arguments = @('release', 'create', $env:GITHUB_REF_NAME) + $assets + @(
            '--verify-tag', '--generate-notes', '--title', "PSWindowsUpdate GUI $env:RELEASE_VERSION"
          )
          if ($env:RELEASE_VERSION.Contains('-')) { $arguments += '--prerelease' }
          gh @arguments
