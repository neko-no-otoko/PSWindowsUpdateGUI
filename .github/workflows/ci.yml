name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      CI: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.300
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Verify formatting
        shell: powershell
        run: |
          dotnet restore .\PSWindowsUpdateGUI.sln --locked-mode
          dotnet format .\PSWindowsUpdateGUI.sln --verify-no-changes --no-restore

      - name: Verify, build, test, and package
        shell: powershell
        run: .\build\Build.ps1 -Configuration Release -Version 1.0.0-ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: warn

      - name: Upload portable build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PSWindowsUpdateGUI-ci
          path: artifacts/release/*
          if-no-files-found: error
