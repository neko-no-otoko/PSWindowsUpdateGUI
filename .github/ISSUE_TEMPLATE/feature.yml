name: Feature request
description: Propose a focused workflow or safety improvement.
title: '[Feature] '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the administrator workflow or risk, not only a preferred control.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility considerations
    validations:
      required: true
